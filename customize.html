<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chỉnh Nội Dung</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #120b14;
      --panel: #1e1520;
      --panel-2: #2a1d2d;
      --line: rgba(255, 255, 255, 0.12);
      --text: #fff7fb;
      --muted: rgba(255, 247, 251, 0.68);
      --accent: #ff6fae;
      --accent-2: #ffc04d;
      --danger: #ff5b75;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 111, 174, 0.18), transparent 28rem),
        radial-gradient(circle at 78% 0%, rgba(255, 192, 77, 0.12), transparent 24rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px clamp(16px, 4vw, 40px);
      background: rgba(18, 11, 20, 0.86);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 24px clamp(16px, 4vw, 40px) 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.8fr);
      gap: 18px;
      align-items: start;
    }

    section {
      padding: 18px;
      background: rgba(30, 21, 32, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    section + section {
      margin-top: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
    }

    label {
      display: block;
      margin: 12px 0 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(0, 0, 0, 0.24);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
    }

    input {
      height: 40px;
      padding: 0 12px;
    }

    input[type="file"] {
      height: auto;
      padding: 10px;
      cursor: pointer;
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--accent);
    }

    textarea {
      min-height: 116px;
      resize: vertical;
      padding: 11px 12px;
      line-height: 1.5;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(255, 111, 174, 0.72);
      box-shadow: 0 0 0 3px rgba(255, 111, 174, 0.14);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    button,
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button.primary {
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), #d84c89);
    }

    button.warning {
      border-color: rgba(255, 192, 77, 0.28);
      color: #ffe1a1;
    }

    button.danger {
      border-color: rgba(255, 91, 117, 0.34);
      color: #ffb9c5;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 10px;
      align-items: end;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(74px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .preview-grid img,
    .single-preview img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #000;
    }

    .single-preview {
      width: 160px;
      margin-top: 12px;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .status {
      min-height: 20px;
      margin-top: 12px;
      color: var(--accent-2);
      font-size: 13px;
      font-weight: 700;
    }

    .config-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 820px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .row,
      .config-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Chỉnh nội dung món quà</h1>
    <div class="toolbar">
      <a class="button" href="index.html" target="_blank" rel="noreferrer">Xem trang</a>
      <button class="primary" type="button" id="saveBtn">Lưu</button>
      <button type="button" id="previewBtn">Lưu & xem</button>
    </div>
  </header>

  <main>
    <div class="grid">
      <div>
        <section>
          <h2>Chữ hiệu ứng</h2>
          <label for="morphTexts">Mỗi dòng là một chữ/cụm chữ</label>
          <textarea id="morphTexts"></textarea>

          <label for="particleImage">Ảnh morph sau chữ</label>
          <div class="row">
            <input id="particleImage" type="text" autocomplete="off">
            <input id="particleImageFile" type="file" accept="image/*">
          </div>
          <div class="single-preview" id="particlePreview"></div>
        </section>

        <section>
          <h2>Quả cầu ảnh</h2>
          <label for="sphereImages">Danh sách ảnh, mỗi dòng một URL hoặc data URL</label>
          <textarea id="sphereImages"></textarea>
          <label for="sphereImageFiles">Thêm ảnh từ máy</label>
          <input id="sphereImageFiles" type="file" accept="image/*" multiple>
          <div class="preview-grid" id="spherePreview"></div>
        </section>

        <section>
          <h2>Lá thư</h2>
          <label for="letterText">Nội dung thư</label>
          <textarea id="letterText"></textarea>

          <label for="letterImage">Ảnh trong thư</label>
          <div class="row">
            <input id="letterImage" type="text" autocomplete="off">
            <input id="letterImageFile" type="file" accept="image/*">
          </div>

          <label for="letterCaption">Caption dưới ảnh</label>
          <input id="letterCaption" type="text" autocomplete="off">
          <div class="single-preview" id="letterPreview"></div>
        </section>
      </div>

      <div>
        <section>
          <h2>Nhạc nền</h2>
          <label for="bgMusic">URL nhạc</label>
          <input id="bgMusic" type="text" autocomplete="off">
          <label for="bgMusicFile">Chọn nhạc từ máy</label>
          <input id="bgMusicFile" type="file" accept="audio/*">
          <label for="bgVolume">Âm lượng</label>
          <input id="bgVolume" type="range" min="0" max="1" step="0.05">
          <div class="muted" id="volumeValue"></div>
        </section>

        <section>
          <h2>Cấu hình</h2>
          <div class="config-actions">
            <button type="button" id="exportBtn">Xuất JSON</button>
            <button type="button" id="importBtn">Nhập JSON</button>
            <button class="warning" type="button" id="loadFileBtn">Tải lại file</button>
            <button class="danger" type="button" id="resetBtn">Xóa bản lưu</button>
          </div>
          <input id="importFile" type="file" accept="application/json,.json" hidden>
          <p class="muted">
            Bản lưu bằng trang này nằm trong trình duyệt hiện tại. Muốn deploy cố định, dùng JSON đã xuất để cập nhật `assets/app-config.json`.
          </p>
          <div class="status" id="status"></div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const DB_NAME = 'GiftCustomizerDB';
    const STORE_NAME = 'settings';
    const CONFIG_KEY = 'config';
    let currentConfig = null;

    const el = {
      morphTexts: document.getElementById('morphTexts'),
      particleImage: document.getElementById('particleImage'),
      particleImageFile: document.getElementById('particleImageFile'),
      particlePreview: document.getElementById('particlePreview'),
      sphereImages: document.getElementById('sphereImages'),
      sphereImageFiles: document.getElementById('sphereImageFiles'),
      spherePreview: document.getElementById('spherePreview'),
      letterText: document.getElementById('letterText'),
      letterImage: document.getElementById('letterImage'),
      letterImageFile: document.getElementById('letterImageFile'),
      letterCaption: document.getElementById('letterCaption'),
      letterPreview: document.getElementById('letterPreview'),
      bgMusic: document.getElementById('bgMusic'),
      bgMusicFile: document.getElementById('bgMusicFile'),
      bgVolume: document.getElementById('bgVolume'),
      volumeValue: document.getElementById('volumeValue'),
      status: document.getElementById('status'),
      importFile: document.getElementById('importFile')
    };

    function setStatus(text) {
      el.status.textContent = text || '';
      if (text) {
        window.clearTimeout(setStatus.timer);
        setStatus.timer = window.setTimeout(() => { el.status.textContent = ''; }, 3500);
      }
    }

    function isPlainObject(value) {
      return value && typeof value === 'object' && !Array.isArray(value);
    }

    function mergeConfig(base, override) {
      const output = Array.isArray(base) ? base.slice() : Object.assign({}, base || {});
      if (!isPlainObject(override)) return output;
      Object.keys(override).forEach((key) => {
        const value = override[key];
        if (isPlainObject(value) && isPlainObject(output[key])) {
          output[key] = mergeConfig(output[key], value);
        } else {
          output[key] = value;
        }
      });
      return output;
    }

    function openDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
        };
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
      });
    }

    async function readSavedConfig() {
      try {
        const db = await openDb();
        return await new Promise((resolve) => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const get = tx.objectStore(STORE_NAME).get(CONFIG_KEY);
          get.onsuccess = () => resolve(get.result || null);
          get.onerror = () => resolve(null);
          tx.oncomplete = () => db.close();
        });
      } catch (e) {
        return null;
      }
    }

    async function writeSavedConfig(config) {
      const db = await openDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(config, CONFIG_KEY);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
      db.close();
    }

    async function clearSavedConfig() {
      const db = await openDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).delete(CONFIG_KEY);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
      db.close();
    }

    async function readFileAsDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function linesToArray(value) {
      return value.split('\n').map((line) => line.trim()).filter(Boolean);
    }

    function renderImage(container, src) {
      container.innerHTML = '';
      if (!src) return;
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      container.appendChild(img);
    }

    function renderSpherePreview() {
      el.spherePreview.innerHTML = '';
      linesToArray(el.sphereImages.value).forEach((src) => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        el.spherePreview.appendChild(img);
      });
    }

    function renderPreviews() {
      renderImage(el.particlePreview, el.particleImage.value.trim());
      renderImage(el.letterPreview, el.letterImage.value.trim());
      renderSpherePreview();
      el.volumeValue.textContent = Math.round(Number(el.bgVolume.value || 0) * 100) + '%';
    }

    async function loadBaseConfig() {
      const response = await fetch('assets/app-config.json', { cache: 'no-store' });
      if (!response.ok) throw new Error('Không đọc được assets/app-config.json');
      return await response.json();
    }

    function fillForm(config) {
      currentConfig = config;
      el.morphTexts.value = (config.morphTexts || []).join('\n');
      el.particleImage.value = config.particleImage || '';
      el.sphereImages.value = (config.sphereImages || []).join('\n');
      el.letterText.value = config.letter?.text || '';
      el.letterImage.value = config.letter?.image || '';
      el.letterCaption.value = config.letter?.caption || '';
      el.bgMusic.value = config.bgMusic || '';
      el.bgVolume.value = typeof config.bgVolume === 'number' ? config.bgVolume : 0.55;
      renderPreviews();
    }

    function readForm() {
      return mergeConfig(currentConfig || {}, {
        morphTexts: linesToArray(el.morphTexts.value),
        particleImage: el.particleImage.value.trim(),
        sphereImages: linesToArray(el.sphereImages.value),
        letter: {
          text: el.letterText.value,
          image: el.letterImage.value.trim(),
          caption: el.letterCaption.value.trim()
        },
        bgMusic: el.bgMusic.value.trim(),
        bgVolume: Number(el.bgVolume.value || 0.55)
      });
    }

    async function saveConfig() {
      const config = readForm();
      await writeSavedConfig(config);
      currentConfig = config;
      setStatus('Đã lưu.');
      return config;
    }

    async function boot(useSaved = true) {
      try {
        const base = await loadBaseConfig();
        const saved = useSaved ? await readSavedConfig() : null;
        fillForm(saved ? mergeConfig(base, saved) : base);
      } catch (e) {
        setStatus(e.message || 'Không tải được cấu hình.');
      }
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      await saveConfig();
    });

    document.getElementById('previewBtn').addEventListener('click', async () => {
      await saveConfig();
      window.open('index.html?t=' + Date.now(), '_blank', 'noreferrer');
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
      if (!confirm('Xóa bản tùy chỉnh đã lưu trong trình duyệt này?')) return;
      await clearSavedConfig();
      await boot(false);
      setStatus('Đã xóa bản lưu.');
    });

    document.getElementById('loadFileBtn').addEventListener('click', async () => {
      await boot(false);
      setStatus('Đã tải lại từ assets/app-config.json.');
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(readForm(), null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'app-config.json';
      a.click();
      URL.revokeObjectURL(url);
      setStatus('Đã xuất JSON.');
    });

    document.getElementById('importBtn').addEventListener('click', () => {
      el.importFile.click();
    });

    el.importFile.addEventListener('change', async () => {
      const file = el.importFile.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        fillForm(mergeConfig(await loadBaseConfig(), JSON.parse(text)));
        setStatus('Đã nhập JSON.');
      } catch (e) {
        setStatus('JSON không hợp lệ.');
      }
      el.importFile.value = '';
    });

    el.particleImageFile.addEventListener('change', async () => {
      const file = el.particleImageFile.files?.[0];
      if (!file) return;
      el.particleImage.value = await readFileAsDataUrl(file);
      renderPreviews();
      el.particleImageFile.value = '';
    });

    el.letterImageFile.addEventListener('change', async () => {
      const file = el.letterImageFile.files?.[0];
      if (!file) return;
      el.letterImage.value = await readFileAsDataUrl(file);
      renderPreviews();
      el.letterImageFile.value = '';
    });

    el.bgMusicFile.addEventListener('change', async () => {
      const file = el.bgMusicFile.files?.[0];
      if (!file) return;
      el.bgMusic.value = await readFileAsDataUrl(file);
      el.bgMusicFile.value = '';
      setStatus('Đã chọn nhạc.');
    });

    el.sphereImageFiles.addEventListener('change', async () => {
      const files = Array.from(el.sphereImageFiles.files || []);
      if (!files.length) return;
      const existing = linesToArray(el.sphereImages.value);
      for (const file of files) {
        existing.push(await readFileAsDataUrl(file));
      }
      el.sphereImages.value = existing.join('\n');
      renderPreviews();
      el.sphereImageFiles.value = '';
    });

    [
      el.particleImage,
      el.letterImage,
      el.sphereImages,
      el.bgVolume
    ].forEach((input) => {
      input.addEventListener('input', renderPreviews);
    });

    boot();
  </script>
</body>
</html>
